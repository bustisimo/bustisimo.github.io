<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Justis DiBattista</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">JD</a>
    <ul id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-right">
      <button id="theme-toggle" aria-label="Toggle dark mode"></button>
      <button id="menu-toggle" aria-label="Toggle navigation">&#9776;</button>
    </div>
  </nav>

  <section id="home" class="hero">
    <div class="container">
      <h1 class="fade-item delay-0">Justis DiBattista</h1>
      <p class="subtitle fade-item delay-1">Triage Operations &amp; Computer Engineer</p>
      <div id="click-counter" class="fade-item delay-2">
        <button id="click-btn">Click Me!</button>
        <p>Total Clicks: <span id="click-count">Loading...</span></p>
      </div>
    </div>
  </section>

  <!-- Game overlay and canvas remains hidden until triggered -->
  <div id="gameOverlay" style="display: none;">
    <canvas id="snakeGame"></canvas>
    <div id="scoreDisplay">Score: 0</div>
    <div id="highScoreDisplay">High Score: 0</div>
    <div id="buttonContainer">
      <button id="playAgainButton" style="display: none" onclick="startGame()">Play Again</button>
      <button id="closeGameButton" onclick="closeGame()">Close Game</button>
    </div>
  </div>

  <button id="snakeButton" onclick="startGame()">Play Snake</button>

  <footer>
    <div class="footer-links">
      <a href="https://github.com/bustisimo" target="_blank">GitHub</a>
      <a href="https://linkedin.com/in/justisdibattista" target="_blank">LinkedIn</a>
    </div>
    <p>&copy; 2026 Justis DiBattista</p>
  </footer>

  <script>
    var counterUrl = 'https://api.counterapi.dev/v1/justisdibattista-site/clicks';

    function updateCount() {
      fetch(counterUrl)
        .then(function (res) { return res.json(); })
        .then(function (data) { document.getElementById('click-count').innerText = data.count; })
        .catch(function () { document.getElementById('click-count').innerText = '---'; });
    }

    function incrementCount() {
      fetch(counterUrl + '/up')
        .then(function (res) { return res.json(); })
        .then(function (data) { document.getElementById('click-count').innerText = data.count; })
        .catch(function () { document.getElementById('click-count').innerText = '---'; });
    }

    document.getElementById('click-btn').addEventListener('click', incrementCount);
    updateCount();
  </script>
  <script src="script.js"></script>
</body>
</html>
